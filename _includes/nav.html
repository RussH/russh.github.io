<header class="navbar">
  <div class="container nav-container">
    <a class="brand" href="/" aria-label="OpenCATS home">
      <img src="/assets/brand/opencats-logo-placeholder.svg" class="logo" alt="OpenCATS">
    </a>
    <nav class="site-nav" aria-label="Primary navigation">
      <ul>
        {% for nav in site.data.nav %}
          <li{% if include.active == nav.title %} class="current"{% endif %}>
            <a href="{{ nav.url }}">{{ nav.title }}</a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
