highlighter: rouge
permalink: pretty
markdown: kramdown

title: OpenCATS Applicant Tracking System
description: "OpenCATS is a free, open-source applicant tracking system and recruiting CRM."

news:
    name: OpenCATS Newsletter
    authors: OpenCATS Community
    url: https://opencats.org/news
    feed: /news.xml

url: "https://opencats.org"

plugins:
    - jekyll-redirect-from
    - jekyll-mentions
    - jekyll-sitemap

exclude:
    - CNAME
    - Gemfile
    - Gemfile.lock
    - LICENSE
    - README.md
    - vendor/
    
